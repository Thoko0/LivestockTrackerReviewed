<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Livestock Tracker</title>

    <!-- Leaflet CSS -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav id="menu-bar">
    <img src="logo.png" alt="Livestock Tracker Logo" id="logo">
    <button id="hamburger">☰</button>

    <button id="home-tab" class="tab active">Home</button>
    <button id="maps-tab" class="tab">Maps</button>
    <button id="devices-tab" class="tab">Devices</button>
    <button id="report-tab" class="tab">Report</button>
</nav>

<!-- HOME -->
<div id="home-section" class="section active">
    <h2>Welcome to Livestock Tracker</h2>
</div>

<!-- MAPS -->
<div id="maps-section" class="section">
    <div id="maps-map" style="height: 500px;"></div>
</div>

<!-- DEVICES -->
<div id="devices-section" class="section">

    <h2>Search Tracker</h2>

    <div id="tracker-search">
        <input type="text" id="trackerIdInput" placeholder="Enter Tracker ID">
        <button id="searchTrackerBtn">Search</button>
    </div>

    <table id="device-table">
        <thead>
            <tr>
                <th>Device ID</th>
                <th>Latitude</th>
                <th>Longitude</th>
                <th>Accel (ax, ay, az)</th>
                <th>Gyro (x, y, z)</th>
                <th>Last Seen</th>
            </tr>
        </thead>
        <tbody id="device-table-body"></tbody>
    </table>

</div>

<!-- REPORT -->
<div id="report-section" class="section">
    <h2>Reports</h2>
    <p>Select a tracker to view historical movement and activity.</p>
</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
