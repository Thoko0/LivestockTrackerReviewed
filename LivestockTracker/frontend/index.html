<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="connect-src * 'self' http: https: ws:;">
    <title>Livestock Tracker</title>

    <!-- Leaflet CSS -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- Bootstrap -->
    <link
        rel="stylesheet"
        href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />

    <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav id="menu-bar">
    <img src="logo.png" alt="Livestock Tracker Logo" id="logo">
    <button id="hamburger">☰</button>

    <button id="home-tab" class="tab active">Home</button>
    <button id="maps-tab" class="tab">Maps</button>
    <button id="devices-tab" class="tab">Devices</button>
    <button id="report-tab" class="tab">Report</button>
</nav>

<!-- HOME -->
<div id="home-section" class="section active">
    <h2>Welcome to Livestock Tracker</h2>
</div>

<!-- MAPS -->
<div id="maps-section" class="section">

    <div class="container-fluid position-relative">
        <div class="row">
            <div class="col-12">
                <!-- MAP -->
                <div id="map" style="height: 500px;"></div>

                <!-- 🔍 MAP SEARCH (MID-RIGHT OVERLAY) -->
                <div id="map-tracker-search">
                    <input
                        type="text"
                        id="mapTrackerIdInput"
                        placeholder="Tracker ID"
                    />
                    <button id="mapSearchBtn">Locate</button>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- DEVICES -->
<div id="devices-section" class="section">

    <h2>Search Tracker</h2>

    <div id="tracker-search">
        <input type="text" id="trackerIdInput" placeholder="Enter Tracker ID">
        <button id="searchTrackerBtn">Search</button>
        <button id="clearTableBtn">Clear Table</button>
    </div>

    <table id="device-table">
        <thead>
            <tr>
                <th>Device ID</th>
                <th>Latitude</th>
                <th>Longitude</th>
                <th>Accel (ax, ay, az)</th>
                <th>Gyro (x, y, z)</th>
                <th>Last Seen</th>
            </tr>
        </thead>
        <tbody id="device-table-body"></tbody>
    </table>

</div>

<!-- REPORT -->
<div id="report-section" class="section">
    <h2>Reports</h2>
    <p>Select a tracker to view historical movement and activity.</p>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- App Script -->
<script src="script.js"></script>

</body>
</html>
