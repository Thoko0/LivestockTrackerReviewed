<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="connect-src * 'self' http: https: ws:;">
    <title>Livestock Tracker</title>

    <!-- Leaflet CSS -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- Bootstrap -->
    <link
        rel="stylesheet"
        href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />

    <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav id="menu-bar">
    <img src="logo.png" alt="Livestock Tracker Logo" id="logo">
    <button id="hamburger">☰</button>

    <button id="home-tab" class="tab active">Home</button>
    <button id="maps-tab" class="tab">Maps</button>
    <button id="devices-tab" class="tab">Devices</button>
    <button id="report-tab" class="tab">Report</button>
</nav>

<!-- HOME -->
<div id="home-section" class="section active">
    <h2>Welcome to Livestock Tracker</h2>
</div>

<!-- MAPS -->
<div id="maps-section" class="section" style="position: relative;">
    <div id="map"></div>

    <div id="map-tracker-search">
        <input type="text" id="mapTrackerIdInput" placeholder="Tracker ID">
        <button id="mapSearchBtn">Locate</button>
    </div>
</div>

<!-- DEVICES -->
<div id="devices-section" class="section">
    <h2>Manage Trackers</h2>

    <!-- Add Tracker Form -->
    <div id="add-tracker-form">
        <input type="text" id="newTrackerId" placeholder="Tracker ID">
        <input type="text" id="newTrackerName" placeholder="Tracker Name (optional)">
        <button id="addTrackerBtn" class="add-btn">Add Tracker</button>
    </div>

    <!-- Tracker Search -->
    <div id="tracker-search">
        <input type="text" id="trackerIdInput" placeholder="Enter Tracker ID">
        <button id="searchTrackerBtn" class="refresh-btn">Search / Refresh</button>
    </div>

    <!-- Devices Table -->
    <div class="table-container">
        <table id="device-table">
            <thead>
                <tr>
                    <th>Device ID</th>
                    <th>Latitude</th>
                    <th>Longitude</th>
                    <th>Accel (ax, ay, az)</th>
                    <th>Gyro (x, y, z)</th>
                    <th>Created At</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="device-table-body">
                <!-- Rows will be added dynamically -->
            </tbody>
        </table>
    </div>
</div>

<!-- REPORT -->
<div id="report-section" class="section">
    <h2>Reports</h2>
    <p>Select a tracker to view historical movement and activity.</p>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- App Script -->
<script src="script.js"></script>

</body>
</html>
