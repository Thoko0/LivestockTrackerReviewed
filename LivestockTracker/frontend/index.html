<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="connect-src * 'self' http: https: ws:;">
    <title>Livestock Tracker</title>

    <!-- Leaflet CSS -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav id="menu-bar">
    <img src="logo.png" alt="Livestock Tracker Logo" id="logo">
    <button id="hamburger">☰</button>

    <button id="home-tab" class="tab active">Home</button>
    <button id="maps-tab" class="tab">Maps</button>
    <button id="devices-tab" class="tab">Devices</button>
    <button id="report-tab" class="tab">Report</button>
</nav>

<!-- HOME -->
<div id="home-section" class="section active">
    <h2>Welcome to Livestock Tracker</h2>
</div>

<!-- MAPS -->
<div id="maps-section" class="section">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <div class="row">
        <div class="col-lg-7 col-md-7 col-12">
            <form method="post" role="form" id="RegisterPOS" class="php-email-form">
                <div class="row">
                <div class="col-md-12">
                    <div id="map" style="height: 400px;"></div>
                </div>
                </div>
                <div class="row">
                    <div class="col-md-6 col-12 form-group mt-3">
                        <input type="text" name="Latitude" class="form-control" id="Latitude" placeholder="Latitude" required>
                        <div class="invalid-feedback">Please enter latitude.</div>
                    </div>
                    <div class="col-md-6 col-12 form-group mt-3">
                        <input type="text" name="Longitude" class="form-control" id="Longitude" placeholder="Longitude" required>
                        <div class="invalid-feedback">Please enter longitude.</div>
                    </div>
                    <div class="col-md-6 col-12 form-group mt-3">
                        <input type="text" name="Pincode" class="form-control" id="Pincode" placeholder="Pincode" required>
                        <div class="invalid-feedback">Please enter pincode.</div>
                    </div>
                </div>
            </form>
        </div>
        <div class="col-lg-5 col-md-5 col-12">
            
        </div>
    </div>
</div>

<!-- DEVICES -->
<div id="devices-section" class="section">

    <h2>Search Tracker</h2>

    <div id="tracker-search">
        <input type="text" id="trackerIdInput" placeholder="Enter Tracker ID">
        <button id="searchTrackerBtn">Search</button>
        <button id="clearTableBtn">Clear Table</button>
    </div>

    <table id="device-table">
        <thead>
            <tr>
                <th>Device ID</th>
                <th>Latitude</th>
                <th>Longitude</th>
                <th>Accel (ax, ay, az)</th>
                <th>Gyro (x, y, z)</th>
                <th>Last Seen</th>
            </tr>
        </thead>
        <tbody id="device-table-body"></tbody>
    </table>

</div>

<!-- REPORT -->
<div id="report-section" class="section">
    <h2>Reports</h2>
    <p>Select a tracker to view historical movement and activity.</p>
</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
